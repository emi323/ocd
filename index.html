<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCD Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { text-align: center; }
        .entry { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>OCD Tracker</h1>
    <div class="entry">
        <label for="episode">Episode:</label>
        <input type="text" id="episode" placeholder="Describe the episode"/>
        <label for="trigger">Trigger:</label>
        <input type="text" id="trigger" placeholder="What triggered it?"/>
        <button onclick="logEntry()">Log Episode</button>
    </div>
    <h2>Statistics</h2>
    <div id="stats"></div>
    <script>
        function logEntry() {
            const episode = document.getElementById('episode').value;
            const trigger = document.getElementById('trigger').value;
            if (episode && trigger) {
                const timeStamp = new Date().toISOString();
                const entry = { episode, trigger, timeStamp };
                let entries = JSON.parse(localStorage.getItem('ocdEntries')) || [];
                entries.push(entry);
                localStorage.setItem('ocdEntries', JSON.stringify(entries));
                displayStats();
                document.getElementById('episode').value = '';
                document.getElementById('trigger').value = '';
            }
        }

        function displayStats() {
            let entries = JSON.parse(localStorage.getItem('ocdEntries')) || [];
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = '';
            entries.forEach(entry => {
                const div = document.createElement('div');
                div.innerHTML = `<strong>Episode:</strong> ${entry.episode} <strong>Trigger:</strong> ${entry.trigger} <strong>Time:</strong> ${new Date(entry.timeStamp).toLocaleString()}`;
                statsDiv.appendChild(div);
            });
        }

        window.onload = displayStats;
    </script>
</body>
</html>
