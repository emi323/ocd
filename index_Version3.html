<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCD Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        nav {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            padding: 10px 20px;
            background: #fff;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        nav a:hover {
            background: #667eea;
            color: white;
        }

        nav a.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .content {
            padding: 30px 20px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="date"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-box h3 {
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-box .number {
            color: #667eea;
            font-size: 2em;
            font-weight: bold;
        }

        .log-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .entries-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .entry {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            position: relative;
        }

        .entry.high-intensity {
            border-left-color: #e74c3c;
        }

        .entry.medium-intensity {
            border-left-color: #f39c12;
        }

        .entry.low-intensity {
            border-left-color: #27ae60;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-date {
            font-weight: bold;
            color: #333;
        }

        .intensity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .intensity-high {
            background: #e74c3c;
            color: white;
        }

        .intensity-medium {
            background: #f39c12;
            color: white;
        }

        .intensity-low {
            background: #27ae60;
            color: white;
        }

        .entry-field {
            margin-bottom: 8px;
            color: #555;
        }

        .entry-field strong {
            color: #333;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px 15px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            nav {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 OCD Tracker</h1>
            <p>Track and understand your OCD episodes</p>
        </header>

        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="settings.html">Settings</a>
            <a href="about.html">About</a>
        </nav>

        <div class="content">
            <!-- Form Section -->
            <div class="form-section">
                <h2>Log New Episode</h2>
                <form id="entryForm">
                    <div class="form-group">
                        <label for="date">Date *</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="trigger">Trigger *</label>
                        <textarea id="trigger" placeholder="What triggered this episode?" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="episode">Episode Description *</label>
                        <textarea id="episode" placeholder="Describe what happened during the episode..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="intensity">Intensity Level (1-10) *</label>
                        <input type="number" id="intensity" min="1" max="10" required>
                    </div>

                    <div class="form-group">
                        <label for="response">Response/Coping Strategy</label>
                        <textarea id="response" placeholder="How did you cope? What helped?"></textarea>
                    </div>

                    <button type="submit">Add Entry</button>
                </form>
            </div>

            <!-- Statistics Section -->
            <div class="stats">
                <div class="stat-box">
                    <h3>Total Entries</h3>
                    <div class="number" id="totalEntries">0</div>
                </div>
                <div class="stat-box">
                    <h3>Average Intensity</h3>
                    <div class="number" id="avgIntensity">0</div>
                </div>
                <div class="stat-box">
                    <h3>This Week</h3>
                    <div class="number" id="thisWeek">0</div>
                </div>
            </div>

            <!-- Log Section -->
            <div class="log-section">
                <h2>Episode Log</h2>
                <div class="entries-list" id="entriesList">
                    <div class="empty-message">No entries yet. Start by logging your first episode!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('entryForm');
        const dateInput = document.getElementById('date');
        let entries = JSON.parse(localStorage.getItem('ocdEntries')) || [];

        // Set today's date as default
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const entry = {
                id: Date.now(),
                date: document.getElementById('date').value,
                trigger: document.getElementById('trigger').value,
                episode: document.getElementById('episode').value,
                intensity: parseInt(document.getElementById('intensity').value),
                response: document.getElementById('response').value
            };

            entries.push(entry);
            localStorage.setItem('ocdEntries', JSON.stringify(entries));

            form.reset();
            dateInput.value = today;
            displayEntries();
            updateStats();
        });

        function displayEntries() {
            const entriesList = document.getElementById('entriesList');

            if (entries.length === 0) {
                entriesList.innerHTML = '<div class="empty-message">No entries yet. Start by logging your first episode!</div>';
                return;
            }

            // Sort entries by date (newest first)
            const sortedEntries = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));

            entriesList.innerHTML = sortedEntries.map(entry => {
                const intensityClass = entry.intensity >= 7 ? 'high-intensity' : entry.intensity >= 4 ? 'medium-intensity' : 'low-intensity';
                const intensityLevel = entry.intensity >= 7 ? 'High' : entry.intensity >= 4 ? 'Medium' : 'Low';
                const intensityBadgeClass = entry.intensity >= 7 ? 'intensity-high' : entry.intensity >= 4 ? 'intensity-medium' : 'intensity-low';

                return `
                    <div class="entry ${intensityClass}">
                        <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
                        <div class="entry-header">
                            <span class="entry-date">${formatDate(entry.date)}</span>
                            <span class="intensity-badge intensity-${intensityBadgeClass}">Intensity: ${entry.intensity}/10</span>
                        </div>
                        <div class="entry-field">
                            <strong>Trigger:</strong> ${entry.trigger}
                        </div>
                        <div class="entry-field">
                            <strong>Episode:</strong> ${entry.episode}
                        </div>
                        ${entry.response ? `<div class="entry-field"><strong>Response:</strong> ${entry.response}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function deleteEntry(id) {
            if (confirm('Are you sure you want to delete this entry?')) {
                entries = entries.filter(entry => entry.id !== id);
                localStorage.setItem('ocdEntries', JSON.stringify(entries));
                displayEntries();
                updateStats();
            }
        }

        function updateStats() {
            const totalEntries = document.getElementById('totalEntries');
            const avgIntensity = document.getElementById('avgIntensity');
            const thisWeek = document.getElementById('thisWeek');

            totalEntries.textContent = entries.length;

            if (entries.length > 0) {
                const avgInt = (entries.reduce((sum, e) => sum + e.intensity, 0) / entries.length).toFixed(1);
                avgIntensity.textContent = avgInt;

                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                const weekEntries = entries.filter(e => new Date(e.date) >= weekAgo).length;
                thisWeek.textContent = weekEntries;
            } else {
                avgIntensity.textContent = '0';
                thisWeek.textContent = '0';
            }
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        // Initial display
        displayEntries();
        updateStats();
    </script>
</body>
</html>
