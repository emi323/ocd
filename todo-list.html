<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #taskInput { width: 200px; }
        .task { display: flex; align-items: center; margin: 5px; }
        .task.completed { text-decoration: line-through; }
    </style>
</head>
<body>
    <h1>To-Do List Application</h1>
    <input id="taskInput" type="text" placeholder="Add new task...">
    <input id="taskPriority" type="number" min="1" max="5" placeholder="Priority (1-5)">
    <button id="addTaskBtn">Add Task</button>
    <h2>Tasks</h2>
    <div id="taskList"></div>
    <div id="stats"></div>
    <script>
        const taskInput = document.getElementById('taskInput');
        const taskPriority = document.getElementById('taskPriority');
        const taskList = document.getElementById('taskList');
        const stats = document.getElementById('stats');
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        const renderTasks = () => {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const taskDiv = document.createElement('div');
                taskDiv.className = 'task ' + (task.completed ? 'completed' : '');
                taskDiv.innerHTML = `<input type='checkbox' ${task.completed ? 'checked' : ''} onchange='toggleTask(${index})'>`;
                taskDiv.innerHTML += `<span>${task.text} (Priority: ${task.priority})</span>`;
                taskDiv.innerHTML += `<button onclick='deleteTask(${index})'>Delete</button>`;
                taskList.appendChild(taskDiv);
            });
            renderStats();
        };

        const addTask = () => {
            if (taskInput.value && taskPriority.value) {
                tasks.push({ text: taskInput.value, completed: false, priority: taskPriority.value });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                taskInput.value = '';
                taskPriority.value = '';
                renderTasks();
            }
        };

        const toggleTask = (index) => {
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };

        const deleteTask = (index) => {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
        };

        const renderStats = () => {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            stats.innerHTML = `<p>Total Tasks: ${total}, Completed: ${completed}</p>`;
        };

        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        renderTasks();
    </script>
</body>
</html>
