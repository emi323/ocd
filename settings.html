<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Settings Page</title>\n</head>\n<body>\n    <nav>\n        <ul>\n            <li><a href="#">Home</a></li>\n            <li><a href="#">Profile</a></li>\n            <li><a href="#">Settings</a></li>\n            <li><a href="#">Logout</a></li>\n        </ul>\n    </nav>\n    <h1>User Preferences</h1>\n    <form id="preferencesForm">\n        <label for="name">Name:</label>\n        <input type="text" id="name" name="name" required>\n        <br>\n        <label for="email">Email:</label>\n        <input type="email" id="email" name="email" required>\n        <br>\n        <label for="theme">Theme:</label>\n        <select id="theme" name="theme">\n            <option value="light">Light</option>\n            <option value="dark">Dark</option>\n        </select>\n        <br>\n        <label for="notifications">Notifications:</label>\n        <input type="checkbox" id="notifications" name="notifications">\n        <br>\n        <button type="submit">Save Preferences</button>\n    </form>\n    <script>\n        // Load stored preferences from Local Storage\n        window.onload = function() {\n            const storedName = localStorage.getItem('name');\n            const storedEmail = localStorage.getItem('email');\n            const storedTheme = localStorage.getItem('theme');\n            const storedNotifications = localStorage.getItem('notifications') === 'true';\n            if (storedName) document.getElementById('name').value = storedName;\n            if (storedEmail) document.getElementById('email').value = storedEmail;\n            if (storedTheme) document.getElementById('theme').value = storedTheme;\n            document.getElementById('notifications').checked = storedNotifications;\n        };\n\n        // Save preferences to Local Storage on form submit\n        document.getElementById('preferencesForm').onsubmit = function(event) {\n            event.preventDefault();\n            localStorage.setItem('name', document.getElementById('name').value);\n            localStorage.setItem('email', document.getElementById('email').value);\n            localStorage.setItem('theme', document.getElementById('theme').value);\n            localStorage.setItem('notifications', document.getElementById('notifications').checked);\n            alert('Preferences saved!');\n        };\n    <\/script>\n</body>\n</html>
